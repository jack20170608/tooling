# Valkey Production Environment Configuration File (Suitable for Standalone/Master-Slave Architecture, Recommended Path: /etc/valkey/valkey-prod.conf)​
# Basic Network Configuration
bind 172.16.10.20 127.0.0.1
port 6379
tcp-backlog 1024
timeout 300
tcp-keepalive 60

# Security Configuration
protected-mode yes
# For production environment, it is recommended to inject via environment variable: $VALKEY_PASSWORD
requirepass 1
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "Valkey_Config_2025"
maxclients 5000

# Persistence Configuration
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dir /appvol/ilovemyhome/data/valkey/
dbfilename dump-6379.rdb

appendonly yes
appendfilename appendonly-6379.aof
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Memory Optimization Configuration
# Adjust according to server memory (e.g., set to 12GB for 16GB server memory)
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Service Operation Configuration
daemonize yes
pidfile "/appvol/ilovemyhome/logs/valkey/valkey-6379.pid"
loglevel notice
logfile "/appvol/ilovemyhome/logs/valkey/valkey-6379.log"
databases 4

# Master-Slave Replication Configuration (Enable only for slave nodes, comment out the following 2 lines for master nodes)
# slaveof 192.168.1.101 6379
# masterauth V@lkey2025_Prod

# Advanced Performance Optimization
# Set to 2 for 4-core CPU, 4 for 8-core CPU, and so on
io-threads 2
io-threads-do-reads yes
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0

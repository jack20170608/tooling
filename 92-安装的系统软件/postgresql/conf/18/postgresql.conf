# -----------------------------
# Basic Settings
# -----------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
unix_socket_directories = '/appvol/ilovemyhome/runtime/postgresql-18/run/postgresql'

# -----------------------------
# Memory Configuration (8GB RAM)
# -----------------------------
shared_buffers = 2GB            # 25% of total RAM
work_mem = 16MB                 # Per-query working memory
maintenance_work_mem = 1GB      # Memory for maintenance operations (VACUUM, CREATE INDEX)
effective_cache_size = 6GB      # Helps query planner estimate available cache

# -----------------------------
# Parallel Query (2-core CPU)
# -----------------------------
max_parallel_workers_per_gather = 1
max_parallel_workers = 2

# -----------------------------
# Write-Ahead Log (WAL)
# -----------------------------
wal_level = replica
fsync = on
synchronous_commit = on
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# -----------------------------
# Performance Tuning
# -----------------------------
effective_io_concurrency = 200  # Typical for SSDs
random_page_cost = 1.1          # Lower for faster storage
log_min_duration_statement = 100ms  # Log queries slower than 100ms

# -----------------------------
# Statistics & Monitoring
# -----------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all

# -----------------------------
# Logging
# -----------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = '/appvol/ilovemyhome/logs/postgresql-18'
log_filename = 'postgresql-%F.log'
log_rotation_age = 1d
log_rotation_size = 0
log_truncate_on_rotation = on
log_line_prefix = '%m [%p] '
log_timezone = 'Asia/Shanghai'

# -----------------------------
# Locale & Formatting
# -----------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Shanghai'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'
